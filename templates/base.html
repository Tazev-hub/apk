<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}АПК им. Пландина{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Подключаем CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>
    <!-- Шапка сайта -->
    
    <header>
        <nav class="navbar navbar-expand-lg bg-white fixed-top shadow-sm" id="mainNav">
            <div class="container">
                <a class="navbar-brand fw-bold text-primary" href="{% url 'home' %}">АПК</a>
                
                <!-- Кнопка-бургер для мобилок -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <!-- Меню -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Главная</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#about">О колледже</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#specialties">Специальности</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'abiturient' %}">Абитуриенту</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'students' %}">Студентам</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'schedule' %}">Расписание</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'contacts' %}">Контакты</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'sveden' %}">Сведения</a></li>
                        <!-- Переключатель темы -->
                        <li class="nav-item">
                            <button class="btn btn-link nav-link" id="themeToggle" onclick="toggleTheme()">
                                <span id="themeIcon">🌙</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Основной контент (будет меняться на разных страницах) -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Подвал -->
    <footer>
        {% include "footer.html" %}
    </footer>


    <!-- Подключаем JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
